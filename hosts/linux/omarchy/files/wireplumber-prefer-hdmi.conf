## Force audio through HDMI/DisplayPort (GPU) and fully disable the onboard
## analog output.
##
## The ALC623 onboard codec exposes its only analog output as a "Headphones"
## port (analog-output-headphones, priority 9900, jack availability unknown),
## so WirePlumber treats it as always-present and keeps routing there even with
## nothing plugged in. Nobody uses wired headphones on this box; audio goes out
## the monitor over DisplayPort. Disable the analog output sink outright so it
## never becomes a routing target, and bump the HDMI sink's session priority.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "alsa_output.pci-0000_c3_00.6.analog-stereo" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.pci-0000_c3_00.1.hdmi-stereo" }
    ]
    actions = {
      update-props = {
        priority.session = 2000
      }
    }
  }
]
