# DCN31 dp_blank wedge mitigation (Framework Desktop / Strix Halo + DP2.1 UHBR):
# omarchy-system-lock, unless OMARCHY_LOCK_ONLY=true, runs `omarchy-brightness-
# display off` after a 3s grace, which does `hyprctl dispatch dpms off; dpms on`.
# That dp_blank wedges the HPO DP stream encoder (dcn31_hpo_dp_stream_enc_dp_blank
# REG_WAIT timeout -> black screen, unrecoverable without cable replug/reboot).
# So EVERY lock path here is forced lock-only: hyprlock still draws over the
# screen, but the panel is never powered off, so the blank never fires.
general {
    lock_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock            # lock without display-off (DCN31)
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 2.5 minutes (GL overlay, no display blank — safe)
listener {
    timeout = 150
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

# Lock system after 5 minutes (screensaver resets idle timer, so have to just do half + 2s margin)
# lock-only: skips omarchy-brightness-display off (the DCN31 dp_blank wedge trigger)
listener {
    timeout = 152
    on-timeout = OMARCHY_LOCK_ONLY=true omarchy-system-lock
    on-resume = omarchy-system-wake
}
