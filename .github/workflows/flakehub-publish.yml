name: Publish and cache main flake

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  flakehub-publish:
    runs-on: macos-14
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure SSH for private flake inputs
        shell: bash
        run: |
          install -d -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.NIX_SECRETS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/flakehub-cache-action@v3
        with:
          flakehub-flake-name: edwinhu/nix

      - name: Build macbook-pro configuration
        run: nix build .#darwinConfigurations.vwh7mb.config.system.build.toplevel --print-build-logs

      - name: Build mba configuration
        run: nix build .#darwinConfigurations.edwinhu.config.system.build.toplevel --print-build-logs

      - uses: DeterminateSystems/flakehub-push@main
        with:
          repository: edwinhu/nix
          name: edwinhu/nix
          rolling: true
          visibility: public
          include-output-paths: true
